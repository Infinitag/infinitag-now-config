; Infinitag Now – Config-Box (ESP32-C3 Super Mini)
; Doku: Repo infinitag-now (docs/18-config-tool.md)
; Protokoll: Repo infinitag-now-core (PROTOCOL.md)

[env:configbox]
platform = espressif32@^6.7.0        ; Arduino-Core 2.x (alte esp_now recv-Callback-Signatur)
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
; Eigene Partitionstabelle (Doc 21 E1): kleinere OTA-Slots, grosses
; LittleFS fuer Geraete-Images. Wechsel einmalig per USB-Flash!
board_build.partitions = partitions_4MB_img.csv
board_build.filesystem = littlefs
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1      ; Serial über nativen USB-Serial-JTAG
    -Wall
lib_deps =
    olikraus/U8g2@^2.35.30
    ; Core-Lib als Symlink auf die lokale Arbeitskopie: immer aktueller
    ; Stand, kein Cache-Drift, kein Push noetig. Fuer Builds ausserhalb
    ; des NAS-Setups stattdessen den Tag pinnen:
    ;   https://github.com/Infinitag/infinitag-now-core.git#v2.0.0
    symlink:///Volumes/Basteln/Infinitag/repos/infinitag-now-core
